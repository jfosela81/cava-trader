name: Bot — Daily Summary (08:00 CEST)

on:
  schedule:
    # 06:00 UTC = 08:00 CEST. Martes a sábado (resumen del día anterior)
    - cron: '0 6 * * 2-6'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call Daily Summary endpoint
        run: |
          curl -s -o response.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.BOT_BASE_URL }}/api/bot/daily-summary" \
            | tee status_code.txt

          echo "Response:"
          cat response.json

          STATUS=$(cat status_code.txt)
          if [ "$STATUS" != "200" ]; then
            echo "Error: HTTP $STATUS"
            exit 1
          fi
